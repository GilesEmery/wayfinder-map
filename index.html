<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Wayfinder Interactive Map</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- PapaParse for CSV -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root{
      --bg:#05070b;
      --panel:rgba(0,0,0,.55);
      --panel2:rgba(0,0,0,.40);
      --border:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.72);
      --muted2:rgba(255,255,255,.55);

      --yellow:#ffd54a;         /* Wayfinder */
      --blue:#4aa3ff;           /* Hub Leader */
      --green:#37d67a;          /* Kaleo Leader */
      --lightgreen:#8cffb0;     /* Kaleo Disciple */
      --pink:#ff5fd1;           /* Impact Studio Member */
      --white:#ffffff;          /* Micro-Church */
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; background:var(--bg); color:var(--text); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    a{ color:inherit; }
    button,input{ font-family:inherit; }

    /* Layout shells */
    .app{ height:100%; width:100%; position:relative; overflow:hidden; }

    /* Desktop (>=1280) */
    .desktop{ display:none; }
    @media (min-width:1280px){
      .desktop{ display:block; height:100%; }
      .mobile{ display:none; }
    }

    /* Mobile/Tablet (<1280) */
    .mobile{ display:block; min-height:100dvh; }

    /* Map */
    #mapDesktop, #mapMobile{ height:100%; width:100%; }
    .mapFrame{
      overflow:hidden;
      border:1px solid var(--border);
      border-radius:18px;
      background:rgba(0,0,0,.35);
    }

    /* Overlays / panels */
    .overlayTop{
      position:absolute; top:14px; left:14px; right:14px;
      display:flex; gap:12px; align-items:flex-start; z-index:1200;
      pointer-events:none;
    }
    .overlayTop > *{ pointer-events:auto; }

    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    .topCard{ padding:12px 12px 10px 12px; max-width:520px; }
    .titleRow{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .title{ font-size:14px; font-weight:800; letter-spacing:.2px; }
    .sub{ font-size:12px; color:var(--muted2); margin-top:2px; }

    .searchWrap{ margin-top:10px; position:relative; }
    .search{
      width:100%;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:var(--text);
      outline:none;
    }
    .search::placeholder{ color:rgba(255,255,255,.55); }

    .suggest{
      position:absolute; left:0; right:0; top:44px;
      background:rgba(0,0,0,.85);
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;
      overflow:hidden;
      max-height:320px;
      overflow-y:auto;
      display:none;
      z-index:1300;
    }
    .suggestItem{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.08);
      cursor:pointer;
      display:flex; justify-content:space-between; gap:12px;
    }
    .suggestItem:last-child{ border-bottom:none; }
    .suggestItem:hover{ background:rgba(255,255,255,.08); }
    .suggestMain{ min-width:0; }
    .suggestName{ font-size:13px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .suggestMeta{ font-size:12px; color:var(--muted2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pill{
      font-size:11px; font-weight:800; padding:3px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.85);
      height:fit-content;
      white-space:nowrap;
    }

    /* Filter buttons (desktop overlay right) */
    .filtersCard{
      padding:10px;
      display:flex; gap:8px; flex-wrap:wrap;
      max-width:420px;
    }
    .btn{
      border-radius:999px;
      padding:8px 10px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.92);
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      transition: background .15s ease, transform .05s ease;
      display:flex; align-items:center; gap:8px;
    }
    .btn:active{ transform: translateY(1px); }
    .btn:hover{ background:rgba(255,255,255,.09); }
    .btnActive{ background:rgba(255,255,255,.14); }
    .count{
      font-variant-numeric: tabular-nums;
      padding:2px 7px;
      border-radius:999px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.85);
      font-size:11px;
      font-weight:900;
    }

    /* Drawer */
    .drawer{
      position:absolute; top:14px; right:14px; bottom:14px;
      width:420px;
      z-index:1250;
      display:none;
      overflow:hidden;
    }
    .drawer.open{ display:block; }
    .drawerInner{ height:100%; display:flex; flex-direction:column; }
    .drawerHeader{
      padding:12px 12px 10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    }
    .drawerTitle{ font-size:13px; font-weight:900; }
    .drawerClose{
      cursor:pointer;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.9);
      padding:6px 9px;
      font-weight:900;
    }
    .drawerBody{
      padding:12px;
      overflow:auto;
    }
    .kv{ margin:10px 0; }
    .k{ font-size:11px; font-weight:900; color:rgba(255,255,255,.70); }
    .v{ margin-top:4px; font-size:13px; color:rgba(255,255,255,.92); line-height:1.35; }
    .linkBtnRow{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .linkBtn{
      display:inline-flex; align-items:center; gap:8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.92);
      font-size:12px;
      font-weight:900;
      text-decoration:none;
      padding:8px 10px;
    }
    .linkBtn:hover{ background:rgba(255,255,255,.10); }

    /* Stack list */
    .stackList{ overflow:hidden; border-radius:16px; border:1px solid rgba(255,255,255,.12); background:rgba(0,0,0,.40); }
    .stackRow{ padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.08); cursor:pointer; display:flex; justify-content:space-between; gap:12px; }
    .stackRow:last-child{ border-bottom:none; }
    .stackRow:hover{ background:rgba(255,255,255,.06); }
    .stackName{ font-size:13px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .stackHub{ font-size:12px; color:rgba(255,255,255,.65); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .stackBadge{
      flex:0 0 auto;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      padding:3px 8px;
      font-size:11px;
      font-weight:900;
      color:rgba(255,255,255,.85);
      height:fit-content;
    }

    /* AZ rail */
    .azWrap{ display:flex; }
    .azRail{
      width:44px;
      border-right:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.35);
      padding:8px 6px;
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:center;
      max-height:460px;
      overflow:auto;
    }
    .azBtn{
      width:32px;
      padding:6px 0;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      color:rgba(255,255,255,.70);
      font-size:11px;
      font-weight:900;
      cursor:pointer;
    }
    .azBtn.active{
      background:rgba(255,255,255,.14);
      color:rgba(255,255,255,.95);
      border-color:rgba(255,255,255,.14);
    }
    .azBody{ flex:1; min-width:0; }
    .pager{
      display:flex; align-items:center; gap:8px;
      padding:8px 10px;
      border-bottom:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.70);
      font-size:12px;
    }
    .pager strong{ color:rgba(255,255,255,.9); }
    .pagerBtn{
      cursor:pointer;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      padding:6px 10px;
      font-weight:900;
      color:rgba(255,255,255,.9);
    }
    .pagerBtn:disabled{ opacity:.4; cursor:not-allowed; }

    /* Get on map */
    .getOnMap{
      position:absolute; left:14px; bottom:14px; z-index:1200;
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      text-decoration:none;
      font-size:12px;
      font-weight:950;
      color:rgba(255,255,255,.95);
      backdrop-filter: blur(10px);
    }
    .getOnMap:hover{ background:rgba(255,255,255,.12); }

    /* Mobile header */
    .mHeader{
      position:sticky;
      top:0;
      z-index:1200;
      border-bottom:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.65);
      backdrop-filter: blur(12px);
      padding:12px 12px 10px;
    }
    .mTitle{ font-size:14px; font-weight:950; }
    .mSearch{ margin-top:10px; position:relative; }
    .mSuggest{ position:absolute; left:0; right:0; top:44px; z-index:1300; }

    .mSection{ padding:12px; }
    .mDetails{
      border-radius:18px;
      border:1px solid var(--border);
      background:var(--panel);
      overflow:hidden;
    }
    .mDetailsHeader{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      display:flex; justify-content:space-between; align-items:center; gap:10px;
    }
    .mDetailsHeader strong{ font-size:13px; }
    .mClose{ border-radius:12px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.06); color:rgba(255,255,255,.9); padding:6px 10px; font-weight:950; cursor:pointer; }
    .mDetailsBody{ padding:12px; }

    .mMap{ padding:0 12px 12px; }
    .mMapInner{ height:55vh; width:100%; }

    .mGrid{ display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:10px; }
    .mGrid .btn{ justify-content:center; padding:10px 10px; border-radius:16px; }

    .mGet{ display:block; width:100%; text-align:center; padding:12px 12px; border-radius:18px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.10); font-weight:950; text-decoration:none; }
    .mGet:hover{ background:rgba(255,255,255,.14); }

    /* Leaflet tweaks (dark-ish) */
    .leaflet-control-zoom a{ background:rgba(0,0,0,.55) !important; color:rgba(255,255,255,.9) !important; border:1px solid rgba(255,255,255,.14) !important; }
    .leaflet-control-zoom a:hover{ background:rgba(0,0,0,.70) !important; }

    /* Glow markers (divIcon) */
    .wfDot{
      width:18px; height:18px; border-radius:9999px;
      position:relative;
      transform:translateZ(0);
    }
    .wfDot::before{
      content:"";
      position:absolute; inset:-18px;
      border-radius:9999px;
      filter: blur(0px);
      opacity:.95;
      animation: pulse 3.4s ease-in-out infinite;
    }
    .wfDot::after{
      content:"";
      position:absolute; inset:-2px;
      border-radius:9999px;
      opacity:.35;
    }
    @keyframes pulse{
      0%,100%{ transform: scale(.92); opacity:.65; }
      50%{ transform: scale(1.06); opacity:1; }
    }
    .wfBadge{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      font-weight:950;
      color:rgba(255,255,255,.95);
      text-shadow:0 1px 2px rgba(0,0,0,.85);
      pointer-events:none;
    }

    /* Color variants */
    .c-yellow{ background:var(--yellow); }
    .c-yellow::before{ background:radial-gradient(circle, rgba(255,213,74,.85) 0%, rgba(255,213,74,.20) 55%, rgba(255,213,74,0) 70%); }
    .c-yellow::after{ background:radial-gradient(circle, rgba(255,213,74,.45), rgba(255,213,74,0) 70%); }

    .c-blue{ background:var(--blue); }
    .c-blue::before{ background:radial-gradient(circle, rgba(74,163,255,.85) 0%, rgba(74,163,255,.20) 55%, rgba(74,163,255,0) 70%); }
    .c-blue::after{ background:radial-gradient(circle, rgba(74,163,255,.45), rgba(74,163,255,0) 70%); }

    .c-green{ background:var(--green); }
    .c-green::before{ background:radial-gradient(circle, rgba(55,214,122,.85) 0%, rgba(55,214,122,.20) 55%, rgba(55,214,122,0) 70%); }
    .c-green::after{ background:radial-gradient(circle, rgba(55,214,122,.45), rgba(55,214,122,0) 70%); }

    .c-lightgreen{ background:var(--lightgreen); }
    .c-lightgreen::before{ background:radial-gradient(circle, rgba(140,255,176,.85) 0%, rgba(140,255,176,.20) 55%, rgba(140,255,176,0) 70%); }
    .c-lightgreen::after{ background:radial-gradient(circle, rgba(140,255,176,.45), rgba(140,255,176,0) 70%); }

    .c-pink{ background:var(--pink); }
    .c-pink::before{ background:radial-gradient(circle, rgba(255,95,209,.85) 0%, rgba(255,95,209,.20) 55%, rgba(255,95,209,0) 70%); }
    .c-pink::after{ background:radial-gradient(circle, rgba(255,95,209,.45), rgba(255,95,209,0) 70%); }

    .c-white{ background:var(--white); }
    .c-white::before{ background:radial-gradient(circle, rgba(255,255,255,.85) 0%, rgba(255,255,255,.18) 55%, rgba(255,255,255,0) 70%); }
    .c-white::after{ background:radial-gradient(circle, rgba(255,255,255,.35), rgba(255,255,255,0) 70%); }

    /* subtle dim for non-highlighted while a role is selected */
    .dimmed{ opacity:.40; filter:saturate(.85); }

    /* small */
    .smallNote{ font-size:11px; color:rgba(255,255,255,.60); margin-top:8px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Desktop -->
  <div class="desktop">
    <div id="mapDesktop"></div>

    <div class="overlayTop">
      <div class="panel topCard">
        <div class="titleRow">
          <div>
            <div class="title">Wayfinder Interactive Map</div>
            <div class="sub">Search any name, hub, city, state, country, mission…</div>
          </div>
          <button id="refreshBtnDesktop" class="btn" type="button" title="Refresh now">Refresh</button>
        </div>

        <div class="searchWrap">
          <input id="searchDesktop" class="search" placeholder="Search…" autocomplete="off" />
          <div id="suggestDesktop" class="suggest"></div>
        </div>

        <div class="smallNote" id="statusDesktop">Loading…</div>
      </div>

      <div class="panel filtersCard" style="margin-left:auto;">
        <button class="btn btnActive" data-role="ALL" type="button">All <span class="count" id="countAll">0</span></button>
        <button class="btn" data-role="HUB_LEADER" type="button">Hub Leader <span class="count" id="countHub">0</span></button>
        <button class="btn" data-role="KALEO_LEADER" type="button">Kaleo Leader <span class="count" id="countKaleoLeader">0</span></button>
        <button class="btn" data-role="IMPACT_STUDIO" type="button">Impact Studio <span class="count" id="countImpact">0</span></button>
        <button class="btn" data-role="KALEO_DISCIPLE" type="button">Kaleo Disciple <span class="count" id="countKaleoDisciple">0</span></button>
        <button class="btn" data-role="MICRO_CHURCH" type="button">Micro-Church <span class="count" id="countMicro">0</span></button>
        <button class="btn" data-role="WAYFINDER" type="button">Wayfinder <span class="count" id="countWayfinder">0</span></button>
      </div>
    </div>

    <a class="getOnMap" href="https://docs.google.com/forms/d/e/1FAIpQLSfRAUACtbH_u24EcC-kZND9bXqLsFqGUIyzuk5E802oqz_grQ/viewform?usp=sharing&ouid=105571108668150573289" target="_blank" rel="noreferrer">
      Get on the Map
    </a>

    <div id="drawerDesktop" class="panel drawer">
      <div class="drawerInner">
        <div class="drawerHeader">
          <div>
            <div class="drawerTitle" id="drawerTitleDesktop">Details</div>
            <div class="sub" id="drawerSubDesktop"></div>
          </div>
          <button class="drawerClose" id="drawerCloseDesktop" type="button">Close</button>
        </div>
        <div class="drawerBody" id="drawerBodyDesktop"></div>
      </div>
    </div>
  </div>

  <!-- Mobile/Tablet -->
  <div class="mobile">
    <div class="mHeader">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
        <div>
          <div class="mTitle">Wayfinder Interactive Map</div>
          <div class="sub">Search any name, hub, city, country…</div>
        </div>
        <button id="refreshBtnMobile" class="btn" type="button">Refresh</button>
      </div>

      <div class="mSearch">
        <input id="searchMobile" class="search" placeholder="Search…" autocomplete="off" />
        <div id="suggestMobile" class="suggest mSuggest"></div>
      </div>

      <div class="smallNote" id="statusMobile">Loading…</div>
    </div>

    <div class="mSection" id="mobileDetailsSection" style="display:none;">
      <div class="mDetails">
        <div class="mDetailsHeader">
          <strong id="mDetailsTitle">Details</strong>
          <button id="mDetailsClose" class="mClose" type="button">Close</button>
        </div>
        <div class="mDetailsBody" id="mDetailsBody"></div>
      </div>
    </div>

    <div class="mMap">
      <div class="mapFrame">
        <div id="mapMobile" class="mMapInner"></div>
      </div>
    </div>

    <div class="mSection">
      <div class="mGrid" id="mobileGrid"></div>
    </div>

    <div class="mSection">
      <a class="mGet" href="https://docs.google.com/forms/d/e/1FAIpQLSfRAUACtbH_u24EcC-kZND9bXqLsFqGUIyzuk5E802oqz_grQ/viewform?usp=sharing&ouid=105571108668150573289" target="_blank" rel="noreferrer">
        Get on the Map
      </a>
    </div>
  </div>

</div>

<script>
(() => {
  // ===== CONFIG =====
  const CSV_URL = "https://docs.google.com/spreadsheets/d/1SVGnUqxy9zOCbfU6-cpYDwzXy0AqY7fulgqWj8H04kM/export?format=csv&gid=807943936";
  const AUTO_REFRESH_MS = 60000;

  // Column headers (must match your sheet)
  const COL = {
    type: "Type",
    hub: "Hub Location",
    name: "Name of Wayfinder",
    email: "Email",
    org: "Organization",
    orgSite: "Organization Website",
    mission: "Mission",
    lat: "Latitude",
    lng: "Longitude",
    city: "City",
    region: "Region",
    state: "State",
    country: "Country",
    published: "isPublished",
    image: "image" // optional if you have it
  };

  const ROLE = {
    ALL: "ALL",
    HUB_LEADER: "HUB_LEADER",
    KALEO_LEADER: "KALEO_LEADER",
    IMPACT_STUDIO: "IMPACT_STUDIO",
    KALEO_DISCIPLE: "KALEO_DISCIPLE",
    MICRO_CHURCH: "MICRO_CHURCH",
    WAYFINDER: "WAYFINDER"
  };

  const ROLE_LABEL = {
    HUB_LEADER: "Hub Leader",
    KALEO_LEADER: "Kaleo Leader",
    IMPACT_STUDIO: "Impact Studio Member",
    KALEO_DISCIPLE: "Kaleo Disciple",
    MICRO_CHURCH: "Micro-Church",
    WAYFINDER: "Wayfinder"
  };

  const ROLE_COLOR_CLASS = {
    HUB_LEADER: "c-blue",
    KALEO_LEADER: "c-green",
    IMPACT_STUDIO: "c-pink",
    KALEO_DISCIPLE: "c-lightgreen",
    MICRO_CHURCH: "c-white",
    WAYFINDER: "c-yellow"
  };

  // ===== STATE =====
  let rows = [];                 // published entries (all)
  let searchable = [];           // published entries (even without coords)
  let mappable = [];             // entries with valid coords
  let activeRole = ROLE.ALL;     // highlight role (others stay yellow)
  let lastLoadedAt = null;

  // Selection / stack state (shared across layouts)
  let selected = null;           // single entry
  let stack = null;              // {lat,lng, items[], radiusMiles}
  let stackLetter = "";
  let stackPage = 0;

  // maps + layers
  let mapD = null, mapM = null;
  let layerD = null, layerM = null;
  let markerIndexD = new Map();  // entryId -> marker
  let markerIndexM = new Map();  // entryId -> marker

  // ===== HELPERS =====
  const isDesktop = () => window.matchMedia("(min-width: 1280px)").matches;
  const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));

  function parseBool(v){
    const s = String(v ?? "").trim().toLowerCase();
    return s === "true" || s === "yes" || s === "1";
  }
  function cleanStr(v){
    return String(v ?? "").trim();
  }
  function numOrNull(v){
    const s = String(v ?? "").trim();
    if(!s) return null;
    const n = Number(s);
    return Number.isFinite(n) ? n : null;
  }
  function hasValidCoords(lat,lng){
    if(lat == null || lng == null) return false;
    if(!Number.isFinite(lat) || !Number.isFinite(lng)) return false;
    if(Math.abs(lat) < 1e-9 && Math.abs(lng) < 1e-9) return false; // treat 0,0 invalid
    if(lat < -90 || lat > 90 || lng < -180 || lng > 180) return false;
    return true;
  }

  function normalizeRoles(typeStr){
    // Sheet "Type" may contain one or multiple selections, e.g. "Wayfinder, Hub Leader"
    const raw = cleanStr(typeStr);
    const parts = raw
      .split(/[;,]/g)
      .map(s => s.trim())
      .filter(Boolean);

    // everyone is Wayfinder by default
    const set = new Set(parts.map(p => p.toLowerCase()));
    set.add("wayfinder");

    const roles = [];
    if(set.has("hub leader")) roles.push(ROLE.HUB_LEADER);
    if(set.has("kaleo leader")) roles.push(ROLE.KALEO_LEADER);
    if(set.has("impact studio member") || set.has("impact studio")) roles.push(ROLE.IMPACT_STUDIO);
    if(set.has("kaleo disciple")) roles.push(ROLE.KALEO_DISCIPLE);
    if(set.has("micro-church") || set.has("micro church") || set.has("microchurch")) roles.push(ROLE.MICRO_CHURCH);
    roles.push(ROLE.WAYFINDER);

    return roles;
  }

  function roleForHighlight(entry){
    // When ALL: everyone is yellow.
    // When a role selected: entries with that role get role color, everyone else stays yellow (dimmed).
    if(activeRole === ROLE.ALL) return ROLE.WAYFINDER;
    if(entry.roles.includes(activeRole)) return activeRole;
    return ROLE.WAYFINDER;
  }

  function radiusMilesForZoom(z){
    if(z <= 4) return 100;
    if(z === 5) return 50;
    if(z === 6) return 25;
    if(z === 7) return 10;
    if(z === 8) return 5;
    if(z === 9) return 1;
    return 0.5;
  }

  function haversineMeters(lat1, lon1, lat2, lon2){
    const R = 6371000;
    const toRad = (d)=> d * Math.PI / 180;
    const dLat = toRad(lat2-lat1);
    const dLon = toRad(lon2-lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
    return 2*R*Math.asin(Math.sqrt(a));
  }

  function nameParts(name){
    const s = cleanStr(name);
    if(!s) return {first:"", last:""};
    const parts = s.split(/\s+/g);
    if(parts.length === 1) return {first:"", last:parts[0]};
    return {first: parts.slice(0,-1).join(" "), last: parts[parts.length-1]};
  }
  function lastInitial(name){
    const {last} = nameParts(name);
    const ch = (last || "#").charAt(0).toUpperCase();
    return /^[A-Z]$/.test(ch) ? ch : "#";
  }
  function sortByLastName(a,b){
    const ap = nameParts(a.name || a.hub);
    const bp = nameParts(b.name || b.hub);
    const lc = ap.last.localeCompare(bp.last, undefined, {sensitivity:"base"});
    if(lc !== 0) return lc;
    const fc = ap.first.localeCompare(bp.first, undefined, {sensitivity:"base"});
    if(fc !== 0) return fc;
    return (a.hub||"").localeCompare(b.hub||"", undefined, {sensitivity:"base"});
  }

  function entryId(e){
    // stable-ish id
    return [
      cleanStr(e.name),
      cleanStr(e.hub),
      String(e.lat ?? ""),
      String(e.lng ?? ""),
      cleanStr(e.city),
      cleanStr(e.country)
    ].join("|");
  }

  function entryLocationLine(e){
    const parts = [e.city, e.state || e.region, e.country].map(cleanStr).filter(Boolean);
    return parts.join(", ");
  }

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;")
      .replaceAll(">","&gt;").replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

    els.statusM.textContent = t;

  function openPanel(){

      els.drawerD.classList.add("open");

      els.mDetailsSection.style.display = "block";
    }
  }
  function collapsePanelOnly(){
    if(isDesktop()){
      els.drawerD.classList.remove("open");
    }else{

  // ===== MARKERS =====
  function makeDotIcon(roleKey, badgeText){
    const cls = ROLE_COLOR_CLASS[roleKey] || "c-yellow";
    const badge = badgeText ? `<div class="wfBadge">${escapeHtml(badgeText)}</div>` : "";
    return L.divIcon({
      className: "",
      html: `<div class="wfDot ${cls}">${badge}</div>`,
      iconSize: [26, 26],
      iconAnchor: [13, 13]
    });
  }

  function renderMarkers(map, layerGroup, markerIndex){
    layerGroup.clearLayers();
    markerIndex.clear();

    for(const e of mappable){
      const highlightRole = roleForHighlight(e);
      const icon = makeDotIcon(highlightRole, "");
      const marker = L.marker([e.lat, e.lng], { icon });

      marker.on("click", () => {
        openNearbyAt(e.lat, e.lng, e, map);
      });

      marker.addTo(layerGroup);
      markerIndex.set(e.id, marker);
    }

    // Dim non-highlighted when a role is selected (ALL keeps all bright yellow)
    if(activeRole !== ROLE.ALL){
      for(const e of mappable){
        const marker = markerIndex.get(e.id);
        if(!marker) continue;
        const isHighlighted = e.roles.includes(activeRole);
        if(!isHighlighted){
          // swap icon to dimmed yellow
          const icon = makeDotIcon(ROLE.WAYFINDER, "");
          marker.setIcon(icon);
          const el = marker.getElement();
          if(el) el.classList.add("dimmed");
        }else{
          const icon = makeDotIcon(activeRole, "");
          marker.setIcon(icon);
          const el = marker.getElement();
          if(el) el.classList.remove("dimmed");
        }
      }
    }
  }

  function flyToEntry(e){
    if(!e || !hasValidCoords(e.lat, e.lng)) return;
    const map = isDesktop() ? mapD : mapM;
    if(!map) return;
    map.flyTo([e.lat, e.lng], Math.max(map.getZoom(), 8), { duration: 0.8 });
  }

  // ===== CLICK RADIUS LIST =====
  function openNearbyAt(lat, lng, fallbackEntry, map){
    const z = map ? map.getZoom() : 4;
    const radiusMiles = radiusMilesForZoom(z);
    const radiusMeters = radiusMiles * 1609.344;

    const nearby = [];
    for(const e of mappable){
      const d = haversineMeters(lat, lng, e.lat, e.lng);
      if(d <= radiusMeters) nearby.push({e, d});
    }
    nearby.sort((a,b)=>a.d-b.d);

    if(nearby.length === 0){
      if(fallbackEntry) openEntry(fallbackEntry);
      return;
    }

    const items = nearby.map(x => x.e);
    if(items.length === 1){
      openEntry(items[0]);
      return;
    }

    // stack/list mode
    selected = null;
    stack = { lat, lng, items, radiusMiles, zoom: z };
    stackLetter = "";
    stackPage = 0;

    // show a "count badge" marker at click center? (visual cue)
    // We'll just open panel with list and show a header with the count.
    openPanel();
    renderPanelContent();

    // For desktop, ensure it's visible
  }

  function openEntry(e){
    stack = null;
    stackLetter = "";
    stackPage = 0;
    selected = e;
    openPanel();
    renderPanelContent();
    flyToEntry(e);
  }

  // ===== PANEL RENDER =====
  function renderPanelContent(){
    if(isDesktop()){
      if(stack){
        els.drawerTitleD.textContent = `Nearby (${stack.items.length})`;
        els.drawerSubD.textContent = `Within ~${stack.radiusMiles} miles`;
        els.drawerBodyD.innerHTML = renderStackHtml(stack);
      }else if(selected){
        els.drawerTitleD.textContent = selected.name || "(No name)";
        els.drawerSubD.textContent = selected.hub ? `Hub: ${selected.hub}` : "";
        els.drawerBodyD.innerHTML = renderEntryHtml(selected);
      }else{
        els.drawerTitleD.textContent = "Details";
        els.drawerSubD.textContent = "";
        els.drawerBodyD.innerHTML = `<div class="sub">Click a marker or search a name.</div>`;
      }
    }else{
      if(stack){
        els.mDetailsTitle.textContent = `Nearby (${stack.items.length})`;
        els.mDetailsBody.innerHTML = renderStackHtml(stack, true);
      }else if(selected){
        els.mDetailsTitle.textContent = selected.name || "(No name)";
        els.mDetailsBody.innerHTML = renderEntryHtml(selected, true);
      }else{
        els.mDetailsTitle.textContent = "Details";
        els.mDetailsBody.innerHTML = `<div class="sub">Tap a marker or search a name.</div>`;
      }
    }

    // attach click handlers for stack list rows + AZ rail
    wirePanelHandlers();
  }

  function renderEntryHtml(e){
    const location = entryLocationLine(e);
    const roles = (e.roles || []).map(r => ROLE_LABEL[r] || r).filter(Boolean);
    const roleText = roles.length ? roles.join(", ") : "Wayfinder";

    const email = cleanStr(e.email);
    const orgSite = cleanStr(e.orgSite);
    const mission = cleanStr(e.mission);
    const org = cleanStr(e.org);
    const image = cleanStr(e.image);

    let links = "";
    if(email){
      links += `<a class="linkBtn" href="mailto:${escapeHtml(email)}">Contact</a>`;
    }
    if(orgSite){
      const url = orgSite.startsWith("http") ? orgSite : `https://${orgSite}`;
      links += `<a class="linkBtn" href="${escapeHtml(url)}" target="_blank" rel="noreferrer">Website</a>`;
    }

    const imgHtml = image ? `
      <div class="kv">
        <div class="k">Image</div>
        <div class="v">
          <img src="${escapeHtml(image)}" alt="Image" style="width:100%; border-radius:14px; border:1px solid rgba(255,255,255,.12);" />
        </div>
      </div>
    ` : "";

    return `
      ${imgHtml}
      <div class="kv">
        <div class="k">Role</div>
        <div class="v">${escapeHtml(roleText)}</div>
      </div>
      <div class="kv">
        <div class="k">Location</div>
        <div class="v">${escapeHtml(location || "—")}</div>
      </div>
      <div class="kv">
        <div class="k">Hub Location</div>
        <div class="v">${escapeHtml(e.hub || "—")}</div>
      </div>
      ${org ? `
        <div class="kv">
          <div class="k">Organization</div>
          <div class="v">${escapeHtml(org)}</div>
        </div>` : ""
      }
      ${mission ? `
        <div class="kv">
          <div class="k">Mission</div>
          <div class="v">${escapeHtml(mission)}</div>
        </div>` : ""
      }
      ${links ? `<div class="linkBtnRow">${links}</div>` : ""}
    `;
  }

  function renderStackHtml(stackObj){
    const all = stackObj.items.slice().sort(sortByLastName);
    if(all.length <= 10){
      return `
        <div class="sub" style="margin-bottom:10px;">Tap a name to open details.</div>
        <div class="stackList">
          ${all.map(e => stackRowHtml(e)).join("")}
        </div>
      `;
    }

    // group by last initial
    const groups = new Map();
    for(const e of all){
      const k = lastInitial(e.name || e.hub);
      if(!groups.has(k)) groups.set(k, []);
      groups.get(k).push(e);
    }

    const letters = Array.from(groups.keys()).sort((a,b)=>{
      // put # at end
      if(a === "#") return 1;
      if(b === "#") return -1;
      return a.localeCompare(b);
    });

    const active = (stackLetter && groups.has(stackLetter)) ? stackLetter : letters[0];
    const items = groups.get(active) || [];
    const pageSize = 10;
    const pages = Math.max(1, Math.ceil(items.length / pageSize));
    const page = clamp(stackPage, 0, pages - 1);
    const slice = items.slice(page * pageSize, page * pageSize + pageSize);

    return `
      <div class="sub" style="margin-bottom:10px;">Tap a name to open details.</div>
      <div class="stackList">
        <div class="azWrap">
          <div class="azRail">
            ${letters.map(L => `
              <button class="azBtn ${L === active ? "active" : ""}" data-az="${escapeHtml(L)}" type="button">${escapeHtml(L)}</button>
            `).join("")}
          </div>
          <div class="azBody">
            <div class="pager">
              <div><strong>${escapeHtml(active)}</strong> <span style="margin-left:8px;">${items.length} name${items.length===1?"":"s"}</span></div>
              <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
                <button class="pagerBtn" data-page="prev" type="button" ${page===0?"disabled":""}>&larr;</button>
                <div style="font-variant-numeric: tabular-nums;">${page+1}/${pages}</div>
                <button class="pagerBtn" data-page="next" type="button" ${page>=pages-1?"disabled":""}>&rarr;</button>
              </div>
            </div>
            ${slice.map(e => stackRowHtml(e)).join("")}
          </div>
        </div>
      </div>
    `;
  }

  function stackRowHtml(e){
    return `
      <div class="stackRow" data-entry="${escapeHtml(e.id)}">
        <div class="suggestMain">
          <div class="stackName">${escapeHtml(e.name || "(No name)")}</div>
          <div class="stackHub">Hub: ${escapeHtml(e.hub || "—")}</div>
        </div>
        <div class="stackBadge">Details</div>
      </div>
    `;
  }

  function wirePanelHandlers(){
    // stack row clicks
    const root = isDesktop() ? els.drawerBodyD : els.mDetailsBody;
    if(!root) return;

    root.querySelectorAll("[data-entry]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.getAttribute("data-entry");
        const e = rows.find(x => x.id === id);
        if(e) openEntry(e);
      });
    });

    root.querySelectorAll("[data-az]").forEach(btn => {
      btn.addEventListener("click", () => {
        stackLetter = btn.getAttribute("data-az") || "";
        stackPage = 0;
        renderPanelContent();
      });
    });

    root.querySelectorAll("[data-page]").forEach(btn => {
      btn.addEventListener("click", () => {
        const dir = btn.getAttribute("data-page");
        if(dir === "prev") stackPage = Math.max(0, stackPage - 1);
        if(dir === "next") stackPage = stackPage + 1;
        renderPanelContent();
      });
    });
  }

  // ===== SEARCH =====
  function allSearchText(e){
    return [
      e.name, e.hub, e.city, e.state, e.region, e.country,
      e.mission, e.org, e.email, e.orgSite,
      (e.roles || []).map(r => ROLE_LABEL[r] || r).join(" ")
    ].map(cleanStr).filter(Boolean).join(" • ").toLowerCase();
  }

  function buildSuggest(query){
    const q = cleanStr(query).toLowerCase();
    if(!q) return [];
    const matches = [];
    for(const e of searchable){
      if(e.searchText.includes(q)){
        matches.push(e);
        if(matches.length >= 40) break;
      }
    }
    return matches;
  }

  function renderSuggest(target, items){
    if(!items.length){
      target.style.display = "none";
      target.innerHTML = "";
      return;
    }
    target.innerHTML = items.map(e => {
      const meta = entryLocationLine(e) || "—";
      return `
        <div class="suggestItem" data-entry="${escapeHtml(e.id)}">
          <div class="suggestMain">
            <div class="suggestName">${escapeHtml(e.name || "(No name)")}</div>
            <div class="suggestMeta">${escapeHtml(meta)} • Hub: ${escapeHtml(e.hub || "—")}</div>
          </div>
          <div class="pill">${escapeHtml((e.roles||[]).includes(ROLE.HUB_LEADER) ? "Hub Leader" : "Wayfinder")}</div>
        </div>
      `;
    }).join("");
    target.style.display = "block";

    target.querySelectorAll("[data-entry]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.getAttribute("data-entry");
        const e = rows.find(x => x.id === id);
        if(e){
          // open details + fly (if coords)
          openEntry(e);
          // hide suggestions
          els.suggestD.style.display = "none";
          els.suggestM.style.display = "none";
        }
      });
    });
  }

  function wireSearch(inputEl, suggestEl){
    inputEl.addEventListener("input", () => {
      const items = buildSuggest(inputEl.value);
      renderSuggest(suggestEl, items);
    });
    inputEl.addEventListener("focus", () => {
      const items = buildSuggest(inputEl.value);
      renderSuggest(suggestEl, items);
    });
    inputEl.addEventListener("blur", () => {
      // delay so click can register
      setTimeout(()=>{ suggestEl.style.display = "none"; }, 140);
    });
    inputEl.addEventListener("keydown", (ev) => {
      if(ev.key === "Escape"){
        suggestEl.style.display = "none";
        inputEl.blur();
      }
    });
  }

  // ===== COUNTS + FILTERS =====
  function computeCounts(){
    const published = rows.length;
    const count = {
      all: published,
      hub: 0,
      kaleoLeader: 0,
      impact: 0,
      kaleoDisciple: 0,
      micro: 0,
      wayfinder: published // everyone
    };

    for(const e of rows){
      if(e.roles.includes(ROLE.HUB_LEADER)) count.hub++;
      if(e.roles.includes(ROLE.KALEO_LEADER)) count.kaleoLeader++;
      if(e.roles.includes(ROLE.IMPACT_STUDIO)) count.impact++;
      if(e.roles.includes(ROLE.KALEO_DISCIPLE)) count.kaleoDisciple++;
      if(e.roles.includes(ROLE.MICRO_CHURCH)) count.micro++;
    }

    els.countAll.textContent = count.all;
    els.countHub.textContent = count.hub;
    els.countKaleoLeader.textContent = count.kaleoLeader;
    els.countImpact.textContent = count.impact;
    els.countKaleoDisciple.textContent = count.kaleoDisciple;
    els.countMicro.textContent = count.micro;
    els.countWayfinder.textContent = count.wayfinder;

    // mobile grid
    els.mGrid.innerHTML = `
      ${mobileBtnHtml("All", ROLE.ALL, count.all, true)}
      ${mobileBtnHtml("Hub Leader", ROLE.HUB_LEADER, count.hub)}
      ${mobileBtnHtml("Kaleo Leader", ROLE.KALEO_LEADER, count.kaleoLeader)}
      ${mobileBtnHtml("Impact Studio", ROLE.IMPACT_STUDIO, count.impact)}
      ${mobileBtnHtml("Kaleo Disciple", ROLE.KALEO_DISCIPLE, count.kaleoDisciple)}
      ${mobileBtnHtml("Micro-Church", ROLE.MICRO_CHURCH, count.micro)}
      ${mobileBtnHtml("Wayfinder", ROLE.WAYFINDER, count.wayfinder)}
    `;

    els.mGrid.querySelectorAll("[data-role]").forEach(btn => {
      btn.addEventListener("click", () => {
        const r = btn.getAttribute("data-role");
        setRole(r);
      });
    });
  }

  function mobileBtnHtml(label, roleKey, count, active=false){
    return `
      <button class="btn ${active ? "btnActive" : ""}" type="button" data-role="${escapeHtml(roleKey)}">
        ${escapeHtml(label)} <span class="count">${count}</span>
      </button>
    `;
  }

  function setRole(roleKey){
    activeRole = roleKey;
    // update desktop filter buttons active state
    document.querySelectorAll(".filtersCard .btn[data-role]").forEach(btn => {
      btn.classList.toggle("btnActive", btn.getAttribute("data-role") === roleKey);
    });
    // update mobile grid active state
    els.mGrid.querySelectorAll(".btn[data-role]").forEach(btn => {
      btn.classList.toggle("btnActive", btn.getAttribute("data-role") === roleKey);
    });

    // rerender markers
    if(mapD && layerD) renderMarkers(mapD, layerD, markerIndexD);
    if(mapM && layerM) renderMarkers(mapM, layerM, markerIndexM);
  }

  // ===== LOAD DATA =====
  async function loadData(){
    setStatus("Loading…");
    try{
      const text = await fetch(CSV_URL, { cache: "no-store" }).then(r => r.text());

      const parsed = Papa.parse(text, { header:true, skipEmptyLines:true });
      const data = parsed.data || [];

      const out = [];
      for(const r of data){
        const published = parseBool(r[COL.published]);
        if(!published) continue;

        const name = cleanStr(r[COL.name]);
        const hub = cleanStr(r[COL.hub]);
        const lat = numOrNull(r[COL.lat]);
        const lng = numOrNull(r[COL.lng]);

        const e = {
          name,
          hub,
          email: cleanStr(r[COL.email]),
          org: cleanStr(r[COL.org]),
          orgSite: cleanStr(r[COL.orgSite]),
          mission: cleanStr(r[COL.mission]),
          city: cleanStr(r[COL.city]),
          region: cleanStr(r[COL.region]),
          state: cleanStr(r[COL.state]),
          country: cleanStr(r[COL.country]),
          lat, lng,
          hasCoords: hasValidCoords(lat,lng),
          roles: normalizeRoles(r[COL.type]),
          image: cleanStr(r[COL.image]),
        };
        e.id = entryId(e);
        e.searchText = allSearchText(e);

        out.push(e);
      }

      rows = out;
      searchable = rows.slice();

      mappable = rows.filter(e => e.hasCoords);

      lastLoadedAt = Date.now();
      setStatus(`Loaded ${rows.length} people • ${mappable.length} mapped`);

      computeCounts();

      // (re)render markers
      if(mapD && layerD) renderMarkers(mapD, layerD, markerIndexD);
      if(mapM && layerM) renderMarkers(mapM, layerM, markerIndexM);

      // if something selected, rerender details (in case name changed etc)
      if(selected || stack) renderPanelContent();

    }catch(err){
      console.error(err);
      setStatus("Error loading data (check sharing + CSV URL).");
    }
  }

  // ===== MAP INIT =====
  function initMaps(){
    // Desktop map
    mapD = L.map("mapDesktop", { zoomControl:true, worldCopyJump:true }).setView([20,0], 2);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(mapD);
    layerD = L.layerGroup().addTo(mapD);

    // Mobile map
    mapM = L.map("mapMobile", { zoomControl:true, worldCopyJump:true }).setView([20,0], 2);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(mapM);
    layerM = L.layerGroup().addTo(mapM);

    // Background map click -> open nearby list (mobile collapses panel first)
    function bindMapInteractions(map){
      // collapse detail/list if user starts interacting again (mobile/tablet)
      map.on("dragstart zoomstart movestart", () => {
        if(!isDesktop()){
          // collapse panel only (keep selection/stack in memory)
          collapsePanelOnly();
        }
      });

      map.on("click", (ev) => {
        // If user taps map background, collapse any panel first on mobile/tablet,
        // then treat click as "area list" click.
        if(!isDesktop()){
          collapsePanelOnly();
        }
        openNearbyAt(ev.latlng.lat, ev.latlng.lng, null, map);
      });
    }

    bindMapInteractions(mapD);
    bindMapInteractions(mapM);
  }

  // ===== WIRING =====
  function wireUI(){
    // search
    wireSearch(els.searchD, els.suggestD);
    wireSearch(els.searchM, els.suggestM);

    // close
    els.drawerCloseD.addEventListener("click", closePanelAndClear);
    els.mDetailsClose.addEventListener("click", closePanelAndClear);

    // refresh
    els.refreshD.addEventListener("click", loadData);
    els.refreshM.addEventListener("click", loadData);

    // desktop filter buttons
    document.querySelectorAll(".filtersCard .btn[data-role]").forEach(btn => {
      btn.addEventListener("click", () => setRole(btn.getAttribute("data-role")));
    });

    // If user clicks outside suggestions, hide
    document.addEventListener("click", (ev) => {
      const t = ev.target;
      if(!(t instanceof Element)) return;
      if(!t.closest(".searchWrap") && !t.closest(".mSearch")){
        els.suggestD.style.display = "none";
        els.suggestM.style.display = "none";
      }
    });

    // when screen switches between mobile/desktop, keep panel state in sync
    window.addEventListener("resize", () => {
      // if switching layouts, ensure panel rendering lands in the visible layout
      if(selected || stack){
        openPanel();
        renderPanelContent();
      }else{
        collapsePanelOnly();
      }
    });
  }

  // ===== START =====
  initMaps();
  wireUI();
  loadData();

  // auto refresh
  setInterval(loadData, AUTO_REFRESH_MS);

  // Default role ALL
  setRole(ROLE.ALL);

})();
</script>
</body>
</html>
