<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Wayfinder Interactive Map</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- PapaParse for CSV -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root{
      --bg:#05070b;
      --panel:rgba(0,0,0,.55);
      --panel2:rgba(0,0,0,.40);
      --border:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.92);
      --muted2:rgba(255,255,255,.55);

      --yellow:#ffd54a;         /* Wayfinder */
      --blue:#4aa3ff;           /* Hub Leader */
      --green:#37d67a;          /* Kaleo Leader */
      --lightgreen:#8cffb0;     /* Kaleo Disciple */
      --pink:#ff5fd1;           /* Impact Studio */
      --white:#ffffff;          /* Micro-Church */
    }

    *{ box-sizing:border-box; }

    /* ✅ MOBILE MUST SCROLL */
    html,body{
      height:auto;
      min-height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      overflow:auto;
    }

    /* ✅ mobile/tablet: scrollable document */
    .app{
      min-height:100dvh;
      width:100%;
      position:relative;
      overflow:auto;
    }

    /* ✅ desktop: full-screen app feel */
    @media (min-width:1280px){
      html,body{ height:100%; overflow:hidden; }
      .app{ height:100%; overflow:hidden; }
    }

    a{ color:inherit; }
    button,input{ font-family:inherit; }

    /* Desktop (>=1280) */
    .desktop{ display:none; }
    @media (min-width:1280px){
      .desktop{ display:block; height:100%; }
      .mobile{ display:none; }
    }

    /* Mobile/Tablet (<1280) */
    .mobile{ display:block; }

    /* Map */
    #mapDesktop, #mapMobile{ height:100%; width:100%; }

    .mapFrame{
      overflow:hidden;
      border:1px solid var(--border);
      border-radius:18px;
      background:rgba(0,0,0,.25);
    }

    /* Panels */
    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    /* Desktop overlay */
    .overlayTop{
      position:absolute; top:14px; left:14px; right:14px;
      display:flex; gap:12px; align-items:flex-start; z-index:1200;
      pointer-events:none;
    }
    .overlayTop > *{ pointer-events:auto; }

    .topCard{ padding:12px 12px 10px 12px; max-width:540px; }
    .titleRow{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .title{ font-size:14px; font-weight:900; letter-spacing:.2px; }
    .sub{ font-size:12px; color:var(--muted2); margin-top:2px; }

    .rightActions{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }

    /* Search */
    .searchWrap{ margin-top:10px; position:relative; }
    .search{
      width:100%;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:var(--text);
      outline:none;
    }
    .search::placeholder{ color:rgba(255,255,255,.55); }

    .suggest{
      position:absolute; left:0; right:0; top:44px;
      background:rgba(0,0,0,.85);
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;
      overflow:hidden;
      max-height:320px;
      overflow-y:auto;
      display:none;
      z-index:1300;
    }
    .suggestItem{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.08);
      cursor:pointer;
      display:flex; justify-content:space-between; gap:12px;
    }
    .suggestItem:last-child{ border-bottom:none; }
    .suggestItem:hover{ background:rgba(255,255,255,.08); }
    .suggestMain{ min-width:0; }
    .suggestName{ font-size:13px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .suggestMeta{ font-size:12px; color:var(--muted2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pill{
      font-size:11px; font-weight:900; padding:3px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.85);
      height:fit-content;
      white-space:nowrap;
    }

    /* Buttons */
    .btn{
      border-radius:999px;
      padding:8px 10px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.92);
      font-size:12px;
      font-weight:900;
      cursor:pointer;
      transition: background .15s ease, transform .05s ease;
      display:flex; align-items:center; gap:8px;
      user-select:none;
      white-space:nowrap;
    }
    .btn:active{ transform: translateY(1px); }
    .btn:hover{ background:rgba(255,255,255,.09); }
    .btnActive{ background:rgba(255,255,255,.14); }

    /* Color outlines for role buttons */
    .btn[data-role="ALL"], .btn[data-role="WAYFINDER"] { border-color: rgba(255, 213, 74, .65); }
    .btn[data-role="HUB_LEADER"] { border-color: rgba(74, 163, 255, .65); }
    .btn[data-role="KALEO_LEADER"] { border-color: rgba(55, 214, 122, .65); }
    .btn[data-role="IMPACT_STUDIO"] { border-color: rgba(255, 95, 209, .65); }
    .btn[data-role="KALEO_DISCIPLE"] { border-color: rgba(140, 255, 176, .65); }
    .btn[data-role="MICRO_CHURCH"] { border-color: rgba(255, 255, 255, .65); }

    /* Active fill tints */
    .btnActive[data-role="ALL"], .btnActive[data-role="WAYFINDER"] { background: rgba(255,213,74,.18); }
    .btnActive[data-role="HUB_LEADER"] { background: rgba(74,163,255,.18); }
    .btnActive[data-role="KALEO_LEADER"] { background: rgba(55,214,122,.18); }
    .btnActive[data-role="IMPACT_STUDIO"] { background: rgba(255,95,209,.18); }
    .btnActive[data-role="KALEO_DISCIPLE"] { background: rgba(140,255,176,.18); }
    .btnActive[data-role="MICRO_CHURCH"] { background: rgba(255,255,255,.12); }

    .count{
      font-variant-numeric: tabular-nums;
      padding:2px 7px;
      border-radius:999px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.85);
      font-size:11px;
      font-weight:950;
    }

    /* Desktop filters stack */
    .filtersWrap{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-left:auto;
      max-width:520px;
      width:520px;
    }
    .filtersCard{
      padding:10px;
      display:flex; gap:8px; flex-wrap:wrap;
    }

    /* Under-role panel (desktop) */
    .underRolePanel{
      padding:10px;
      display:none;
      max-height:62vh;
      overflow:auto;
    }
    .underRolePanel.open{ display:block; }

    .panelHeaderRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }
    .panelHeaderRow .h{
      font-size:12px;
      font-weight:950;
      color:rgba(255,255,255,.90);
    }

    /* List rows */
    .listBox{
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.40);
      overflow:hidden;
    }
    .listRow{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.08);
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      gap:10px;
    }
    .listRow:last-child{ border-bottom:none; }
    .listRow:hover{ background:rgba(255,255,255,.06); }
    .listName{ font-size:13px; font-weight:950; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .listMeta{ font-size:12px; color:rgba(255,255,255,.65); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Entry details */
    .kv{ margin:10px 0; }
    .k{ font-size:11px; font-weight:950; color:rgba(255,255,255,.70); }
    .v{ margin-top:4px; font-size:13px; color:rgba(255,255,255,.92); line-height:1.35; }

    .linkBtnRow{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .linkBtn{
      display:inline-flex; align-items:center; gap:8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.92);
      font-size:12px;
      font-weight:950;
      text-decoration:none;
      padding:8px 10px;
    }
    .linkBtn:hover{ background:rgba(255,255,255,.10); }

    /* Desktop: Get on the Map */
    .getOnMap{
      position:absolute; left:14px; bottom:14px; z-index:1200;
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 12px;
      border-radius:16px;
      border:1px solid var(--border);
      background:var(--panel);
      text-decoration:none;
      font-size:12px;
      font-weight:950;
      color:rgba(255,255,255,.95);
    }
    .getOnMap:hover{ background: rgba(0,0,0,.65); }

    /* Mobile header */
    .mHeader{
      position:sticky;
      top:0;
      z-index:1200;
      border-bottom:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.65);
      backdrop-filter: blur(12px);
      padding:12px 12px 10px;
    }
    .mTitle{ font-size:14px; font-weight:950; }
    .mSearch{ margin-top:10px; position:relative; }
    .mSuggest{ position:absolute; left:0; right:0; top:44px; z-index:1300; }

    .mSection{ padding:12px; }

    /* Mobile map always visible */
    .mMap{ padding:12px; padding-top:10px; }
    .mMapInner{
      width:100%;
      height:56svh;
      min-height:360px;
    }

    .mDetails{
      border-radius:18px;
      border:1px solid var(--border);
      background:var(--panel);
      overflow:hidden;
    }
    .mDetailsHeader{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      display:flex; justify-content:space-between; align-items:center; gap:10px;
    }
    .mDetailsHeader strong{ font-size:13px; }
    .mClose{
      border-radius:12px; border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.9);
      padding:6px 10px;
      font-weight:950;
      cursor:pointer;
    }
    .mDetailsBody{ padding:12px; }

    .mGrid{ display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:10px; }
    .mGrid .btn{ justify-content:center; padding:10px 10px; border-radius:16px; }

    .mGet{
      display:block; width:100%; text-align:center;
      padding:12px 12px;
      border-radius:18px;
      border:1px solid var(--border);
      background:var(--panel);
      font-weight:950;
      text-decoration:none;
    }
    .mGet:hover{ background: rgba(0,0,0,.65); }

    /* Leaflet controls */
    .leaflet-control-zoom a{
      background:rgba(0,0,0,.55) !important;
      color:rgba(255,255,255,.9) !important;
      border:1px solid rgba(255,255,255,.14) !important;
    }
    .leaflet-control-zoom a:hover{ background:rgba(0,0,0,.70) !important; }

    /* Glow markers */
    .wfDot{
      width:18px; height:18px; border-radius:9999px;
      position:relative;
      transform:translateZ(0);
    }
    .wfDot::before{
      content:"";
      position:absolute; inset:-18px;
      border-radius:9999px;
      opacity:.95;
      animation: pulse 3.4s ease-in-out infinite;
    }
    .wfDot::after{
      content:"";
      position:absolute; inset:-2px;
      border-radius:9999px;
      opacity:.35;
    }
    @keyframes pulse{
      0%,100%{ transform: scale(.92); opacity:.65; }
      50%{ transform: scale(1.06); opacity:1; }
    }
    .wfBadge{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      font-weight:950;
      color:rgba(255,255,255,.95);
      text-shadow:0 1px 2px rgba(0,0,0,.85);
      pointer-events:none;
    }

    /* Marker colors */
    .c-yellow{ background:var(--yellow); }
    .c-yellow::before{ background:radial-gradient(circle, rgba(255,213,74,.85) 0%, rgba(255,213,74,.20) 55%, rgba(255,213,74,0) 70%); }
    .c-yellow::after{ background:radial-gradient(circle, rgba(255,213,74,.45), rgba(255,213,74,0) 70%); }

    .c-blue{ background:var(--blue); }
    .c-blue::before{ background:radial-gradient(circle, rgba(74,163,255,.85) 0%, rgba(74,163,255,.20) 55%, rgba(74,163,255,0) 70%); }
    .c-blue::after{ background:radial-gradient(circle, rgba(74,163,255,.45), rgba(74,163,255,0) 70%); }

    .c-green{ background:var(--green); }
    .c-green::before{ background:radial-gradient(circle, rgba(55,214,122,.85) 0%, rgba(55,214,122,.20) 55%, rgba(55,214,122,0) 70%); }
    .c-green::after{ background:radial-gradient(circle, rgba(55,214,122,.45), rgba(55,214,122,0) 70%); }

    .c-lightgreen{ background:var(--lightgreen); }
    .c-lightgreen::before{ background:radial-gradient(circle, rgba(140,255,176,.85) 0%, rgba(140,255,176,.20) 55%, rgba(140,255,176,0) 70%); }
    .c-lightgreen::after{ background:radial-gradient(circle, rgba(140,255,176,.45), rgba(140,255,176,0) 70%); }

    .c-pink{ background:var(--pink); }
    .c-pink::before{ background:radial-gradient(circle, rgba(255,95,209,.85) 0%, rgba(255,95,209,.20) 55%, rgba(255,95,209,0) 70%); }
    .c-pink::after{ background:radial-gradient(circle, rgba(255,95,209,.45), rgba(255,95,209,0) 70%); }

    .c-white{ background:var(--white); }
    .c-white::before{ background:radial-gradient(circle, rgba(255,255,255,.85) 0%, rgba(255,255,255,.18) 55%, rgba(255,255,255,0) 70%); }
    .c-white::after{ background:radial-gradient(circle, rgba(255,255,255,.35), rgba(255,255,255,0) 70%); }

    .dimmed{ opacity:.40; filter:saturate(.85); }
    .smallNote{ font-size:11px; color:rgba(255,255,255,.60); margin-top:8px; }
  </style>
</head>

<body>
<div class="app">

  <!-- Desktop -->
  <div class="desktop">
    <div id="mapDesktop"></div>

    <div class="overlayTop">
      <div class="panel topCard">
        <div class="titleRow">
          <div>
            <div class="title">Wayfinder Interactive Map</div>
            <div class="sub">Search any name, hub, city, state, country, mission…</div>
          </div>

          <div class="rightActions">
            <button id="recenterBtnDesktop" class="btn" type="button">Recenter</button>
            <button id="refreshBtnDesktop" class="btn" type="button">Refresh</button>
          </div>
        </div>

        <div class="searchWrap">
          <input id="searchDesktop" class="search" placeholder="Search…" autocomplete="off" />
          <div id="suggestDesktop" class="suggest"></div>
        </div>

        <div class="smallNote" id="statusDesktop">Loading…</div>
      </div>

      <div class="filtersWrap">
        <div class="panel filtersCard">
          <button class="btn btnActive" data-role="ALL" type="button">All <span class="count" id="countAll">0</span></button>
          <button class="btn" data-role="HUB_LEADER" type="button">Hub Leader <span class="count" id="countHub">0</span></button>
          <button class="btn" data-role="KALEO_LEADER" type="button">Kaleo Leader <span class="count" id="countKaleoLeader">0</span></button>
          <button class="btn" data-role="IMPACT_STUDIO" type="button">Impact Studio <span class="count" id="countImpact">0</span></button>
          <button class="btn" data-role="KALEO_DISCIPLE" type="button">Kaleo Disciple <span class="count" id="countKaleoDisciple">0</span></button>
          <button class="btn" data-role="MICRO_CHURCH" type="button">Micro-Church <span class="count" id="countMicro">0</span></button>
          <button class="btn" data-role="WAYFINDER" type="button">Wayfinder <span class="count" id="countWayfinder">0</span></button>
        </div>

        <div id="underRolePanel" class="panel underRolePanel"></div>
      </div>
    </div>

    <a class="getOnMap" href="https://docs.google.com/forms/d/e/1FAIpQLSfRAUACtbH_u24EcC-kZND9bXqLsFqGUIyzuk5E802oqz_grQ/viewform?usp=sharing&ouid=105571108668150573289" target="_blank" rel="noreferrer">
      Get on the Map
    </a>
  </div>

  <!-- Mobile/Tablet -->
  <div class="mobile">
    <div class="mHeader">
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:10px;">
        <div>
          <div class="mTitle">Wayfinder Interactive Map</div>
          <div class="sub">Search any name, hub, city, country…</div>
        </div>
        <div class="rightActions">
          <button id="recenterBtnMobile" class="btn" type="button">Recenter</button>
          <button id="refreshBtnMobile" class="btn" type="button">Refresh</button>
        </div>
      </div>

      <div class="mSearch">
        <input id="searchMobile" class="search" placeholder="Search…" autocomplete="off" />
        <div id="suggestMobile" class="suggest mSuggest"></div>
      </div>

      <div class="smallNote" id="statusMobile">Loading…</div>
    </div>

    <div class="mMap">
      <div class="mapFrame">
        <div id="mapMobile" class="mMapInner"></div>
      </div>
    </div>

    <!-- details under map -->
    <div class="mSection" id="mobileDetailsSection" style="display:none;">
      <div class="mDetails">
        <div class="mDetailsHeader">
          <strong id="mDetailsTitle">Details</strong>
          <button id="mDetailsClose" class="mClose" type="button">Close</button>
        </div>
        <div class="mDetailsBody" id="mDetailsBody"></div>
      </div>
    </div>

    <!-- role buttons -->
    <div class="mSection">
      <div class="mGrid" id="mobileGrid"></div>
    </div>

    <!-- get on map -->
    <div class="mSection">
      <a class="mGet" href="https://docs.google.com/forms/d/e/1FAIpQLSfRAUACtbH_u24EcC-kZND9bXqLsFqGUIyzuk5E802oqz_grQ/viewform?usp=sharing&ouid=105571108668150573289" target="_blank" rel="noreferrer">
        Get on the Map
      </a>
    </div>
  </div>

</div>

<script>
(() => {
  // ===== CONFIG =====
  const CSV_URL = "https://docs.google.com/spreadsheets/d/1SVGnUqxy9zOCbfU6-cpYDwzXy0AqY7fulgqWj8H04kM/export?format=csv&gid=807943936";
  const AUTO_REFRESH_MS = 60000;

  // Lighter basemap for visibility
  const TILE_URL = "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png";
  const TILE_ATTR = '&copy; OpenStreetMap contributors &copy; CARTO';

  // Columns
  const COL = {
    type: "Type",
    hub: "Hub Location",
    name: "Name of Wayfinder",
    email: "Email",
    org: "Organization",
    orgSite: "Organization Website",
    mission: "Mission",
    lat: "Latitude",
    lng: "Longitude",
    city: "City",
    region: "Region",
    state: "State",
    country: "Country",
    published: "isPublished",
    image: "image"
  };

  const ROLE = {
    ALL: "ALL",
    HUB_LEADER: "HUB_LEADER",
    KALEO_LEADER: "KALEO_LEADER",
    IMPACT_STUDIO: "IMPACT_STUDIO",
    KALEO_DISCIPLE: "KALEO_DISCIPLE",
    MICRO_CHURCH: "MICRO_CHURCH",
    WAYFINDER: "WAYFINDER"
  };

  const ROLE_LABEL = {
    HUB_LEADER: "Hub Leader",
    KALEO_LEADER: "Kaleo Leader",
    IMPACT_STUDIO: "Impact Studio Member",
    KALEO_DISCIPLE: "Kaleo Disciple",
    MICRO_CHURCH: "Micro-Church",
    WAYFINDER: "Wayfinder"
  };

  const ROLE_COLOR_CLASS = {
    HUB_LEADER: "c-blue",
    KALEO_LEADER: "c-green",
    IMPACT_STUDIO: "c-pink",
    KALEO_DISCIPLE: "c-lightgreen",
    MICRO_CHURCH: "c-white",
    WAYFINDER: "c-yellow"
  };

  // When these roles selected on desktop, show list under role buttons
  const ROLES_WITH_LIST_PANEL = new Set([ROLE.IMPACT_STUDIO, ROLE.KALEO_LEADER, ROLE.HUB_LEADER]);

  // ===== STATE =====
  let rows = [];
  let searchable = [];
  let mappable = [];
  let activeRole = ROLE.ALL;
  let lastLoadedAt = null;

  let selected = null;
  let stack = null;
  let stackLetter = "";
  let stackPage = 0;

  let mapD = null, mapM = null;
  let layerD = null, layerM = null;
  let markerIndexD = new Map();
  let markerIndexM = new Map();

  // ===== HELPERS =====
  const isDesktop = () => window.matchMedia("(min-width: 1280px)").matches;
  const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));

  function parseBool(v){
    const s = String(v ?? "").trim().toLowerCase();
    return s === "true" || s === "yes" || s === "1";
  }
  function cleanStr(v){ return String(v ?? "").trim(); }
  function numOrNull(v){
    const s = String(v ?? "").trim();
    if(!s) return null;
    const n = Number(s);
    return Number.isFinite(n) ? n : null;
  }
  function hasValidCoords(lat,lng){
    if(lat == null || lng == null) return false;
    if(!Number.isFinite(lat) || !Number.isFinite(lng)) return false;
    if(Math.abs(lat) < 1e-9 && Math.abs(lng) < 1e-9) return false; // block 0,0
    if(lat < -90 || lat > 90 || lng < -180 || lng > 180) return false;
    return true;
  }

  function normalizeRoles(typeStr){
    const raw = cleanStr(typeStr);
    const parts = raw.split(/[;,]/g).map(s => s.trim()).filter(Boolean);
    const set = new Set(parts.map(p => p.toLowerCase()));
    set.add("wayfinder"); // everyone is Wayfinder

    const roles = [];
    if(set.has("hub leader")) roles.push(ROLE.HUB_LEADER);
    if(set.has("kaleo leader")) roles.push(ROLE.KALEO_LEADER);
    if(set.has("impact studio member") || set.has("impact studio")) roles.push(ROLE.IMPACT_STUDIO);
    if(set.has("kaleo disciple")) roles.push(ROLE.KALEO_DISCIPLE);
    if(set.has("micro-church") || set.has("micro church") || set.has("microchurch")) roles.push(ROLE.MICRO_CHURCH);
    roles.push(ROLE.WAYFINDER);
    return roles;
  }

  function roleForHighlight(entry){
    if(activeRole === ROLE.ALL) return ROLE.WAYFINDER;
    if(entry.roles.includes(activeRole)) return activeRole;
    return ROLE.WAYFINDER;
  }

  function radiusMilesForZoom(z){
    if(z <= 4) return 100;
    if(z === 5) return 50;
    if(z === 6) return 25;
    if(z === 7) return 10;
    if(z === 8) return 5;
    if(z === 9) return 1;
    return 0.5;
  }

  function haversineMeters(lat1, lon1, lat2, lon2){
    const R = 6371000;
    const toRad = (d)=> d * Math.PI / 180;
    const dLat = toRad(lat2-lat1);
    const dLon = toRad(lon2-lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
    return 2*R*Math.asin(Math.sqrt(a));
  }

  function nameParts(name){
    const s = cleanStr(name);
    if(!s) return {first:"", last:""};
    const parts = s.split(/\s+/g);
    if(parts.length === 1) return {first:"", last:parts[0]};
    return {first: parts.slice(0,-1).join(" "), last: parts[parts.length-1]};
  }
  function lastInitial(name){
    const {last} = nameParts(name);
    const ch = (last || "#").charAt(0).toUpperCase();
    return /^[A-Z]$/.test(ch) ? ch : "#";
  }
  function sortByLastName(a,b){
    const ap = nameParts(a.name || a.hub);
    const bp = nameParts(b.name || b.hub);
    const lc = ap.last.localeCompare(bp.last, undefined, {sensitivity:"base"});
    if(lc !== 0) return lc;
    const fc = ap.first.localeCompare(bp.first, undefined, {sensitivity:"base"});
    if(fc !== 0) return fc;
    return (a.hub||"").localeCompare(b.hub||"", undefined, {sensitivity:"base"});
  }

  function entryId(e){
    return [
      cleanStr(e.name),
      cleanStr(e.hub),
      String(e.lat ?? ""),
      String(e.lng ?? ""),
      cleanStr(e.city),
      cleanStr(e.country)
    ].join("|");
  }

  function entryLocationLine(e){
    const parts = [e.city, e.state || e.region, e.country].map(cleanStr).filter(Boolean);
    return parts.join(", ");
  }

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

    if(!panel) return;

    panel.querySelectorAll("[data-entry]").forEach(el => {

        renderPanelContentDesktop();

    panel.querySelectorAll("[data-page]").forEach(btn => {

        if(dir === "prev") stackPage = Math.max(0, stackPage - 1);
        if(dir === "next") stackPage = stackPage + 1;

  // ===== MARKERS =====
  function makeDotIcon(roleKey, badgeText){
    const cls = ROLE_COLOR_CLASS[roleKey] || "c-yellow";
    const badge = badgeText ? `<div class="wfBadge">${escapeHtml(badgeText)}</div>` : "";
    return L.divIcon({
      className: "",
      html: `<div class="wfDot ${cls}">${badge}</div>`,
      iconSize: [26, 26],
      iconAnchor: [13, 13]
    });
  }

  function renderMarkers(map, layerGroup, markerIndex){
    layerGroup.clearLayers();
    markerIndex.clear();

    for(const e of mappable){
      const highlightRole = roleForHighlight(e);
      const icon = makeDotIcon(highlightRole, "");
      const marker = L.marker([e.lat, e.lng], { icon });

      const openFn = () => openNearbyAt(e.lat, e.lng, e, map);
      marker.on("click", openFn);
      marker.on("touchstart", openFn); // ✅ better mobile taps

      marker.addTo(layerGroup);
      markerIndex.set(e.id, marker);
    }

    if(activeRole !== ROLE.ALL){
      for(const e of mappable){
        const marker = markerIndex.get(e.id);
        if(!marker) continue;
        const isHighlighted = e.roles.includes(activeRole);
        if(!isHighlighted){
          marker.setIcon(makeDotIcon(ROLE.WAYFINDER, ""));
          const el = marker.getElement();
          if(el) el.classList.add("dimmed");
        }else{
          marker.setIcon(makeDotIcon(activeRole, ""));
          const el = marker.getElement();
          if(el) el.classList.remove("dimmed");
        }
      }
    }
  }

  function flyToEntry(e){
    if(!e || !hasValidCoords(e.lat, e.lng)) return;
    const map = isDesktop() ? mapD : mapM;
    if(!map) return;
    map.flyTo([e.lat, e.lng], Math.max(map.getZoom(), 8), { duration: 0.8 });
  }

  // ===== CLICK RADIUS LIST =====
  function openNearbyAt(lat, lng, fallbackEntry, map){
    const z = map ? map.getZoom() : 4;
    const radiusMiles = radiusMilesForZoom(z);
    const radiusMeters = radiusMiles * 1609.344;

    const nearby = [];
    for(const e of mappable){
      const d = haversineMeters(lat, lng, e.lat, e.lng);
      if(d <= radiusMeters) nearby.push({e, d});
    }
    nearby.sort((a,b)=>a.d-b.d);

    if(nearby.length === 0){
      if(fallbackEntry) openEntry(fallbackEntry);
      return;
    }

    const items = nearby.map(x => x.e);
    if(items.length === 1){
      openEntry(items[0]);
      return;
    }

    selected = null;
    stack = { lat, lng, items, radiusMiles, zoom: z };
    stackLetter = "";
    stackPage = 0;

    if(isDesktop()){
      renderPanelContentDesktop();
    }else{
      openMobileDetails();
      renderPanelContentMobile();
    }
  }

  function openEntry(e){
    stack = null;
    stackLetter = "";
    stackPage = 0;
    selected = e;

    if(isDesktop()){
      renderEntryDesktop(e);
    }else{
      openMobileDetails();
      renderPanelContentMobile();
    }
    flyToEntry(e);
  }

  function renderStackHtml(stackObj){
    const all = stackObj.items.slice().sort(sortByLastName);
    if(all.length <= 10){
      return `
        <div class="sub" style="margin-bottom:10px;">Tap a name to open details.</div>
        <div class="listBox">
          ${all.map(e => `
            <div class="listRow" data-entry="${escapeHtml(e.id)}">
              <div style="min-width:0;">
                <div class="listName">${escapeHtml(e.name || "(No name)")}</div>
                <div class="listMeta">${escapeHtml(entryLocationLine(e) || "—")} • Hub: ${escapeHtml(e.hub || "—")}</div>
              </div>
              <div class="pill">Details</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    const groups = new Map();
    for(const e of all){
      const k = lastInitial(e.name || e.hub);
      if(!groups.has(k)) groups.set(k, []);
      groups.get(k).push(e);
    }

    const letters = Array.from(groups.keys()).sort((a,b)=>{
      if(a === "#") return 1;
      if(b === "#") return -1;
      return a.localeCompare(b);
    });

    const active = (stackLetter && groups.has(stackLetter)) ? stackLetter : letters[0];
    const items = groups.get(active) || [];
    const pageSize = 10;
    const pages = Math.max(1, Math.ceil(items.length / pageSize));
    const page = clamp(stackPage, 0, pages - 1);
    const slice = items.slice(page * pageSize, page * pageSize + pageSize);

    return `
      <div class="sub" style="margin-bottom:10px;">Tap a name to open details.</div>
      <div class="listBox" style="overflow:hidden;">
        <div style="display:flex;">
          <div style="width:44px; border-right:1px solid rgba(255,255,255,.10); background:rgba(0,0,0,.35); padding:8px 6px; display:flex; flex-direction:column; gap:6px; align-items:center; max-height:420px; overflow:auto;">
            ${letters.map(L => `
              <button class="btn ${L === active ? "btnActive" : ""}" data-az="${escapeHtml(L)}" type="button" style="width:32px; justify-content:center; padding:6px 0; border-radius:10px; font-size:11px;">
                ${escapeHtml(L)}
              </button>
            `).join("")}
          </div>
          <div style="flex:1; min-width:0;">
            <div style="display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid rgba(255,255,255,.10); color:rgba(255,255,255,.70); font-size:12px;">
              <div><strong style="color:rgba(255,255,255,.92);">${escapeHtml(active)}</strong> <span style="margin-left:8px;">${items.length} name${items.length===1?"":"s"}</span></div>
              <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
                <button class="btn" data-page="prev" type="button" ${page===0?"disabled":""} style="padding:6px 10px; border-radius:12px;">&larr;</button>
                <div style="font-variant-numeric: tabular-nums;">${page+1}/${pages}</div>
                <button class="btn" data-page="next" type="button" ${page>=pages-1?"disabled":""} style="padding:6px 10px; border-radius:12px;">&rarr;</button>
              </div>
            </div>
            ${slice.map(e => `
              <div class="listRow" data-entry="${escapeHtml(e.id)}">
                <div style="min-width:0;">
                  <div class="listName">${escapeHtml(e.name || "(No name)")}</div>
                  <div class="listMeta">${escapeHtml(entryLocationLine(e) || "—")} • Hub: ${escapeHtml(e.hub || "—")}</div>
                </div>
                <div class="pill">Details</div>
              </div>
            `).join("")}
          </div>
        </div>
      </div>
    `;
  }

  // ===== SEARCH =====
  function allSearchText(e){
    return [
      e.name, e.hub, e.city, e.state, e.region, e.country,
      e.mission, e.org, e.email, e.orgSite,
      (e.roles || []).map(r => ROLE_LABEL[r] || r).join(" ")
    ].map(cleanStr).filter(Boolean).join(" • ").toLowerCase();
  }

  function buildSuggest(query){
    const q = cleanStr(query).toLowerCase();
    if(!q) return [];
    const matches = [];
    for(const e of searchable){
      if(e.searchText.includes(q)){
        matches.push(e);
        if(matches.length >= 40) break;
      }
    }
    return matches;
  }

  function renderSuggest(target, items){
    if(!items.length){
      target.style.display = "none";
      target.innerHTML = "";
      return;
    }
    target.innerHTML = items.map(e => {
      const meta = entryLocationLine(e) || "—";
      return `
        <div class="suggestItem" data-entry="${escapeHtml(e.id)}">
          <div class="suggestMain">
            <div class="suggestName">${escapeHtml(e.name || "(No name)")}</div>
            <div class="suggestMeta">${escapeHtml(meta)} • Hub: ${escapeHtml(e.hub || "—")}</div>
          </div>
          <div class="pill">${escapeHtml((e.roles||[]).includes("HUB_LEADER") ? "Hub Leader" : "Wayfinder")}</div>
        </div>
      `;
    }).join("");
    target.style.display = "block";

    target.querySelectorAll("[data-entry]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.getAttribute("data-entry");
        const e = rows.find(x => x.id === id);
        if(e){
          openEntry(e);
          target.style.display = "none";
        }
      });
    });
  }

  function wireSearch(inputEl, suggestEl){
    inputEl.addEventListener("input", () => renderSuggest(suggestEl, buildSuggest(inputEl.value)));
    inputEl.addEventListener("focus", () => renderSuggest(suggestEl, buildSuggest(inputEl.value)));
    inputEl.addEventListener("blur", () => setTimeout(()=>{ suggestEl.style.display = "none"; }, 140));
  }

  // ===== COUNTS + FILTERS =====

  // ===== DATA LOAD =====
  async function loadData(){
    setStatus("Loading…");
    try{
      const text = await fetch(CSV_URL, { cache: "no-store" }).then(r => r.text());
      const parsed = Papa.parse(text, { header:true, skipEmptyLines:true });
      const data = parsed.data || [];

      const out = [];
      for(const r of data){
        const published = parseBool(r[COL.published]);
        if(!published) continue;

        const lat = numOrNull(r[COL.lat]);
        const lng = numOrNull(r[COL.lng]);

        const e = {
          name: cleanStr(r[COL.name]),
          hub: cleanStr(r[COL.hub]),
          email: cleanStr(r[COL.email]),
          org: cleanStr(r[COL.org]),
          orgSite: cleanStr(r[COL.orgSite]),
          mission: cleanStr(r[COL.mission]),
          city: cleanStr(r[COL.city]),
          region: cleanStr(r[COL.region]),
          state: cleanStr(r[COL.state]),
          country: cleanStr(r[COL.country]),
          lat, lng,
          hasCoords: hasValidCoords(lat,lng),
          roles: normalizeRoles(r[COL.type]),
          image: cleanStr(r[COL.image]),
        };
        e.id = entryId(e);
        e.searchText = allSearchText(e);

        out.push(e);
      }

      rows = out;
      searchable = rows.slice();                 // ✅ includes people with no coords
      mappable = rows.filter(e => e.hasCoords);  // ✅ map only those with valid coords

      lastLoadedAt = Date.now();
      setStatus(`Loaded ${rows.length} people • ${mappable.length} mapped`);

      computeCounts();

      if(mapD && layerD) renderMarkers(mapD, layerD, markerIndexD);
      if(mapM && layerM) renderMarkers(mapM, layerM, markerIndexM);

      if(isDesktop() && ROLES_WITH_LIST_PANEL.has(activeRole)){
        renderRoleListUnderButtons(activeRole);
      }

    }catch(err){
      console.error(err);
      setStatus("Error loading data (check sharing + CSV URL).");
    }
  }

  // ===== MAP INIT =====
  function initMaps(){
    const worldLatBounds = L.latLngBounds(L.latLng(-85, -180), L.latLng(85, 180));
    function wrapLng(lng){ return ((lng + 180) % 360 + 360) % 360 - 180; }
    function keepSingleWorld(map){
      map.on("moveend", () => {
        const c = map.getCenter();
        const w = wrapLng(c.lng);
        if(Math.abs(w - c.lng) > 0.001){
          map.panTo([c.lat, w], { animate:false });
        }
      });
    }

    mapD = L.map("mapDesktop", {
      zoomControl:true,
      worldCopyJump:false,
      minZoom: 2,
      maxBounds: worldLatBounds,
      maxBoundsViscosity: 0.7
    }).setView([20,0], 2);

    L.tileLayer(TILE_URL, {
      maxZoom: 19,
      attribution: TILE_ATTR,
      subdomains: "abcd"
    }).addTo(mapD);
    layerD = L.layerGroup().addTo(mapD);
    keepSingleWorld(mapD);

    mapM = L.map("mapMobile", {
      zoomControl:true,
      worldCopyJump:false,
      minZoom: 2,
      maxBounds: worldLatBounds,
      maxBoundsViscosity: 0.7
    }).setView([20,0], 2);

    L.tileLayer(TILE_URL, {
      maxZoom: 19,
      attribution: TILE_ATTR,
      subdomains: "abcd"
    }).addTo(mapM);
    layerM = L.layerGroup().addTo(mapM);
    keepSingleWorld(mapM);

    // click background opens nearby list
    mapD.on("click", (ev) => openNearbyAt(ev.latlng.lat, ev.latlng.lng, null, mapD));
    mapM.on("click", (ev) => openNearbyAt(ev.latlng.lat, ev.latlng.lng, null, mapM));

    setTimeout(() => {
      mapD && mapD.invalidateSize();
      mapM && mapM.invalidateSize();
    }, 250);

    window.addEventListener("orientationchange", () => {
      setTimeout(() => mapM && mapM.invalidateSize(), 300);
    });
  }

  function recenterDesktop(){
    mapD && mapD.setView([20,0], 2, { animate:false });
    mapD && mapD.invalidateSize();
  }
  function recenterMobile(){
    mapM && mapM.setView([20,0], 2, { animate:false });
    mapM && mapM.invalidateSize();
  }

  // ===== UI WIRING =====
  function wireUI(){
    wireSearch(document.getElementById("searchDesktop"), document.getElementById("suggestDesktop"));
    wireSearch(document.getElementById("searchMobile"), document.getElementById("suggestMobile"));

    document.getElementById("mDetailsClose").addEventListener("click", () => {
      selected = null; stack = null; stackLetter=""; stackPage=0;
      closeMobileDetails();
    });

    document.getElementById("refreshBtnDesktop").addEventListener("click", loadData);
    document.getElementById("refreshBtnMobile").addEventListener("click", loadData);

    document.getElementById("recenterBtnDesktop").addEventListener("click", recenterDesktop);
    document.getElementById("recenterBtnMobile").addEventListener("click", recenterMobile);

    document.querySelectorAll(".filtersCard .btn[data-role]").forEach(btn => {
      btn.addEventListener("click", () => setRole(btn.getAttribute("data-role")));
    });

    // suggestions click handlers
    function wireSuggestClicks(suggestEl){
      suggestEl.addEventListener("click", (ev) => {
        const item = ev.target.closest("[data-entry]");
        if(!item) return;
        const id = item.getAttribute("data-entry");
        const e = rows.find(x => x.id === id);
        if(e) openEntry(e);
        suggestEl.style.display = "none";
      });
    }
    wireSuggestClicks(document.getElementById("suggestDesktop"));
    wireSuggestClicks(document.getElementById("suggestMobile"));

    // hide suggests when clicking elsewhere
    document.addEventListener("click", (ev) => {
      const t = ev.target;
      if(!(t instanceof Element)) return;
      if(!t.closest(".searchWrap") && !t.closest(".mSearch")){
        document.getElementById("suggestDesktop").style.display = "none";
        document.getElementById("suggestMobile").style.display = "none";
      }
    });

    window.addEventListener("resize", () => {
      setTimeout(() => {
        mapD && mapD.invalidateSize();
        mapM && mapM.invalidateSize();
      }, 120);

      if(isDesktop() && ROLES_WITH_LIST_PANEL.has(activeRole)){
        renderRoleListUnderButtons(activeRole);
      }
    });
  }

  // ===== START =====
  initMaps();
  wireUI();
  loadData();
  setInterval(loadData, AUTO_REFRESH_MS);
  setRole(ROLE.ALL);

})();
</script>
</body>
</html>
